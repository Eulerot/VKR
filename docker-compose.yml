version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: repair_planner_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - repair_network

  go-server:
    build: ./go-server
    container_name: repair_planner_server
    ports:
      - "${TCP_PORT}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      TCP_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repair_network

networks:
  repair_network:
    driver: bridge